id: rs-no-swallowing-error-match-default
language: Rust
severity: error
files:
  - '**/*.rs'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/__tests__/**'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
rule:
  kind: match_arm
  regex: '^\s*Err\(_\)\s*=>'
message: 'Matching Err(_) into a default removes failure without a lawful owner or witness'
note: 'Repair at the owner layer. Prefer explicit optional handling or a typed error.'
metadata:
  policy_group: fallback
  violation_class: fallback_unowned_handler
  owner_hint: application
  approval_mode: registry_policy_comment
