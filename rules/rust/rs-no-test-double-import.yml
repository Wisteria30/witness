id: rs-no-test-double-import
language: Rust
severity: error
files:
  - '**/*.rs'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/__tests__/**'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
rule:
  any:
    - pattern: use mockall::$PATH;
    - pattern: use faux::$PATH;
    - pattern: use mockito::$PATH;
message: 'Runtime Rust code must not import test-double tooling'
note: 'Runtime code must not rely on test doubles. Move it to tests or promote it to a first-class adapter with contract tests and composition-root selection.'
metadata:
  policy_group: test-double
  violation_class: runtime_double_in_graph
  owner_hint: tests
  approval_mode: none
