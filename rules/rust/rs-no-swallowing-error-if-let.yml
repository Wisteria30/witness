id: rs-no-swallowing-error-if-let
language: Rust
severity: error
files:
  - '**/*.rs'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/__tests__/**'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
rule:
  any:
    - pattern: |
        if let Err($ERR) = $EXPR {
          return $DEFAULT;
        }
    - pattern: |
        if let None = $EXPR {
          return $DEFAULT;
        }
message: 'if let Err/None default handling removes failure without a lawful owner or witness'
note: 'Repair at the owner layer. Prefer explicit optional handling or a typed error.'
metadata:
  policy_group: fallback
  violation_class: fallback_unowned_handler
  owner_hint: application
  approval_mode: none
