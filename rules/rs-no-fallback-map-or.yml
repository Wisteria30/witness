id: rs-no-fallback-map-or
language: Rust
severity: error
files:
  - '**/*.rs'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/__tests__/**'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
rule:
  pattern: $EXPR.map_or($DEFAULT, $FUNC)
message: 'Inline fallback via map_or owns policy at the wrong layer'
note: 'Repair at the owner layer. Use explicit optional handling, a typed error, or a boundary parser.'
metadata:
  policy_group: fallback
  violation_class: fallback_unowned_default
  owner_hint: boundary
  approval_mode: none
