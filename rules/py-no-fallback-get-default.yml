id: py-no-fallback-get-default
language: Python
severity: error
files:
  - '**/*.py'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/*_test.py'
  - '**/test_*.py'
  - '**/conftest.py'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
rule:

  pattern: $OBJ.get($KEY, $DEFAULT)
  not:
    pattern: router.get($KEY, $DEFAULT)
message: 'Inline default via `.get(..., default)` owns policy at the wrong layer'
note: 'Repair at the owner layer. Use an approved policy API, a boundary parser/settings model, optional/union handling, a typed exception, or an explicit resilience adapter.'
metadata:
  policy_group: fallback
  violation_class: fallback_unowned_default
  owner_hint: boundary
  approval_mode: registry_policy_comment
