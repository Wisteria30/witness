id: ts-no-fallback-lookup-else-default
language: TypeScript
severity: error
files:
  - '**/*.ts'
  - '**/*.tsx'
  - '**/*.cts'
  - '**/*.mts'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - '**/__tests__/**'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
rule:

  pattern: "$KEY in $OBJ ? $OBJ[$KEY] : $DEFAULT"
message: 'Lookup-else-default ternary is still an inline fallback'
note: 'Repair at the owner layer. Use an approved policy API, a boundary parser/settings model, optional/union handling, a typed exception, or an explicit resilience adapter.'
metadata:
  policy_group: fallback
  violation_class: fallback_unowned_default
  owner_hint: boundary
  approval_mode: registry_policy_comment
