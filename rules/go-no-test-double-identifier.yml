id: go-no-test-double-identifier
language: Go
severity: error
files:
  - '**/*.go'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/*_test.go'
  - '**/__tests__/**'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
  - '**/*.pb.go'
  - '**/*.gen.go'
  - '**/zz_generated*.go'
rule:
  kind: identifier
  regex: '(?i)(mock|stub|fake)'
message: 'Runtime Go code must not contain mock/stub/fake identifiers'
note: 'Runtime code must not rely on test doubles. Move it to tests or promote it to a first-class adapter with contract tests and composition-root selection.'
metadata:
  policy_group: test-double
  violation_class: runtime_double_in_graph
  owner_hint: tests
  approval_mode: none
