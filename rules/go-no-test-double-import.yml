id: go-no-test-double-import
language: Go
severity: error
files:
  - '**/*.go'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/*_test.go'
  - '**/__tests__/**'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
  - '**/*.pb.go'
  - '**/*.gen.go'
  - '**/zz_generated*.go'
rule:
  any:
    - pattern: import "github.com/stretchr/testify/mock"
    - pattern: import "go.uber.org/mock/gomock"
message: 'Runtime Go code must not import test-double tooling'
note: 'Runtime code must not rely on test doubles. Move it to tests or promote it to a first-class adapter with contract tests and composition-root selection.'
metadata:
  policy_group: test-double
  violation_class: runtime_double_in_graph
  owner_hint: tests
  approval_mode: none
