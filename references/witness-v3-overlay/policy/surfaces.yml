# Symbol-level interface surface rules.
# Path-level ownership lives in ownership.yml.
# This file governs which concept nouns are public by default,
# which ones are intended for extension, and what export witnesses count.
#
# A symbol becomes a public concept when it carries owner-layer meaning.
# One-off mechanics should stay local or nested.

public_by_default:
  concept_patterns:
    # Domain / boundary types
    - "*Payload"
    - "*Settings"
    - "*Config"
    - "*Parser"

    # Policy / business rule
    - "*Policy"
    - "*Validator"

    # Error / exception
    - "*Error"
    - "*Exception"

    # Infrastructure / adapter
    - "*Adapter"
    - "*Repository"
    - "*Service"
    - "*Mailer"
    - "*EventStore"

    # CQRS / handler
    - "*Query"
    - "*Command"
    - "*Handler"

extension_api_patterns:
  - "*Protocol"
  - "*Interface"
  - "*Base"

export_manifest:
  python:
    - "__all__"
    - "__init__.py re-export"
  typescript:
    - "named export"
    - "barrel index re-export"
  go:
    - "exported name (capitalized)"
  rust:
    - "pub visibility"
    - "pub use re-export"

rules:
  forbid_restricted_visibility_for_public_concepts: true
  require_explicit_export_manifest_for_new_public_symbols: true
