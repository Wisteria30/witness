# Symbol-level interface surface rules.
# Path-level ownership lives in ownership.yml.
# This file governs which concept nouns are public by default.
#
# To extend: add a pattern when the concept is an owner-layer noun
# that will be referenced across module boundaries.
# Do NOT add patterns for one-off helpers or internal mechanics.

public_by_default:
  concept_patterns:
    # Domain / boundary types
    - "*Payload"
    - "*Settings"
    - "*Config"
    - "*Parser"
    # Policy / business rule
    - "*Policy"
    - "*Validator"
    # Error / exception
    - "*Error"
    - "*Exception"
    # Infrastructure / adapter
    - "*Adapter"
    - "*Repository"
    - "*Service"
    - "*Mailer"
    - "*EventStore"
    # CQRS / handler (if applicable)
    - "*Query"
    - "*Command"
    - "*Handler"

export_manifest:
  python:
    - "__all__"
    - "__init__.py re-export"
  typescript:
    - "named export"
    - "barrel index re-export"
  go:
    - "exported name (capitalized)"
  rust:
    - "pub visibility"
    - "pub use re-export"
